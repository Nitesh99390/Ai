<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Chat - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #616161; }
        
        .markdown-body p { margin-bottom: 0.5rem; }
        .markdown-body pre { background: #1e1e1e; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #333;}
        .markdown-body code { font-family: monospace; font-size: 0.9em; color: #7dd3fc; }
    </style>
</head>
<body class="bg-[#212121] text-gray-200 h-screen flex flex-col overflow-hidden selection:bg-blue-500 selection:text-white">

    <header class="bg-[#171717] border-b border-gray-800 p-4 flex justify-between items-center relative z-10 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                AI
            </div>
            <h1 class="text-lg font-semibold tracking-wide">Nexus Chat</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="clearChatBtn" title="Clear Chat" class="p-2 bg-transparent hover:bg-red-500/20 text-gray-400 hover:text-red-400 rounded-full transition-colors cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
            
            <button id="exportChatBtn" title="Download Chat" class="p-2 bg-transparent hover:bg-green-500/20 text-gray-400 hover:text-green-400 rounded-full transition-colors cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>

            <button id="menuBtn" title="Settings" class="p-2 bg-transparent hover:bg-gray-800 text-gray-300 rounded-full transition-colors focus:outline-none cursor-pointer">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path>
                </svg>
            </button>
        </div>
    </header>

    <div id="settingsOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] hidden flex items-center justify-center transition-opacity">
        <div id="settingsModal" class="bg-[#2a2a2a] w-11/12 max-w-md border border-gray-700 rounded-2xl shadow-2xl p-6 flex flex-col gap-4 transform scale-95 transition-transform max-h-[90vh] overflow-y-auto">
            
            <div class="flex justify-between items-center border-b border-gray-700 pb-3">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-widest">System Configuration</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-white p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 font-medium">Provider</label>
                    <select id="aiProvider" class="w-full p-2.5 bg-[#1e1e1e] border border-gray-600 rounded-xl outline-none text-sm text-white focus:border-blue-500 transition-colors cursor-pointer">
                        <option value="groq">Groq</option>
                        <option value="gemini">Google Gemini</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 font-medium">Model</label>
                    <select id="aiModel" class="w-full p-2.5 bg-[#1e1e1e] border border-gray-600 rounded-xl outline-none text-sm text-white focus:border-blue-500 transition-colors cursor-pointer">
                        </select>
                </div>
            </div>
            
            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-medium">API Key</label>
                <input type="password" id="apiKey" placeholder="Paste your API key here..." class="w-full p-3 bg-[#1e1e1e] border border-gray-600 rounded-xl outline-none text-sm text-white focus:border-blue-500 font-mono transition-colors">
            </div>

            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-medium">System Prompt (Optional Persona)</label>
                <textarea id="systemPrompt" rows="2" placeholder="e.g. You are a helpful expert coder." class="w-full p-3 bg-[#1e1e1e] border border-gray-600 rounded-xl outline-none text-sm text-white focus:border-blue-500 transition-colors resize-none"></textarea>
            </div>

            <div class="flex items-center ml-1">
                <input type="checkbox" id="saveKeyCheck" class="w-4 h-4 text-blue-600 bg-[#1e1e1e] border-gray-600 rounded cursor-pointer accent-blue-600">
                <label for="saveKeyCheck" class="ml-3 text-sm text-gray-300 cursor-pointer select-none">Save Settings Locally</label>
            </div>
            
            <button id="saveSettingsBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold py-3.5 rounded-xl transition-colors mt-2 shadow-lg shadow-blue-600/20 active:scale-[0.98]">
                Save & Apply
            </button>
        </div>
    </div>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col items-center relative">
        <div id="chatBox" class="w-full max-w-3xl flex flex-col gap-6 pb-4">
            <div class="flex gap-4 w-full">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center font-bold text-xs shadow-[0_0_10px_rgba(37,99,235,0.4)]">AI</div>
                <div class="flex-1 bg-[#2f2f2f] text-gray-100 p-4 rounded-2xl rounded-tl-none shadow-sm text-[15px] leading-relaxed border border-white/5">
                    Hello! I'm ready. The system has been upgraded with the latest models. Please configure your settings from the 3-dot menu.
                </div>
            </div>
        </div>
    </main>

    <div class="bg-[#212121] p-4 w-full flex justify-center pb-6 border-t border-gray-800/50">
        <div class="w-full max-w-3xl relative flex items-end bg-[#2a2a2a] rounded-3xl border border-gray-600 focus-within:border-gray-400 transition-colors shadow-lg">
            <textarea id="chatInput" rows="1" placeholder="Type your message..." class="w-full max-h-32 p-4 pl-5 bg-transparent outline-none text-gray-200 resize-none text-[15px] leading-tight custom-scrollbar" style="min-height: 56px;"></textarea>
            
            <button id="sendBtn" class="p-2 m-2 bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center w-10 h-10 shadow-md">
                <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatInput = document.getElementById('chatInput');
        const chatBox = document.getElementById('chatBox');
        const chatContainer = document.getElementById('chatContainer');
        const sendBtn = document.getElementById('sendBtn');
        const menuBtn = document.getElementById('menuBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const exportChatBtn = document.getElementById('exportChatBtn');
        
        const settingsOverlay = document.getElementById('settingsOverlay');
        const settingsModal = document.getElementById('settingsModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const providerSelect = document.getElementById('aiProvider');
        const modelSelect = document.getElementById('aiModel');

        // Context Memory & Delay Config
        let chatHistory = [];
        const MAX_HISTORY = 10;
        const BOT_DELAY_MS = 4000;

        // Model Definitions
        const modelList = {
            groq: [
                { id: 'llama-3.3-70b-versatile', name: 'Llama 3.3 (70B)' },
                { id: 'llama-3.1-8b-instant', name: 'Llama 3.1 (8B)' },
                { id: 'mixtral-8x7b-32768', name: 'Mixtral 8x7b' },
                { id: 'gemma2-9b-it', name: 'Gemma 2 (9B)' }
            ],
            gemini: [
                { id: 'gemini-2.0-flash', name: 'Gemini 2.0 Flash' },
                { id: 'gemini-1.5-pro', name: 'Gemini 1.5 Pro' },
                { id: 'gemini-1.5-flash', name: 'Gemini 1.5 Flash' }
            ]
        };

        // Populate Model Dropdown based on Provider
        function updateModelDropdown(selectedProvider) {
            modelSelect.innerHTML = '';
            modelList[selectedProvider].forEach(model => {
                const option = document.createElement('option');
                option.value = model.id;
                option.textContent = model.name;
                modelSelect.appendChild(option);
            });
        }
        
        providerSelect.addEventListener('change', (e) => {
            updateModelDropdown(e.target.value);
        });

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        // Modal Logic
        function openModal() {
            settingsOverlay.classList.remove('hidden');
            setTimeout(() => settingsModal.classList.remove('scale-95'), 10);
        }
        function closeModal() {
            settingsModal.classList.add('scale-95');
            setTimeout(() => settingsOverlay.classList.add('hidden'), 200);
        }
        menuBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        settingsOverlay.addEventListener('click', (e) => { if(e.target === settingsOverlay) closeModal(); });

        // Save & Load Settings
        saveSettingsBtn.addEventListener('click', () => {
            if(document.getElementById('saveKeyCheck').checked) {
                localStorage.setItem("aiKey", document.getElementById('apiKey').value);
                localStorage.setItem("aiProvider", document.getElementById('aiProvider').value);
                localStorage.setItem("aiModel", document.getElementById('aiModel').value);
                localStorage.setItem("aiSystemPrompt", document.getElementById('systemPrompt').value);
            } else {
                localStorage.clear();
            }
            closeModal();
        });

        document.addEventListener("DOMContentLoaded", () => {
            // Default setup
            updateModelDropdown('groq');

            // Load saved
            if (localStorage.getItem("aiProvider")) {
                providerSelect.value = localStorage.getItem("aiProvider");
                updateModelDropdown(providerSelect.value);
            }
            if (localStorage.getItem("aiModel")) {
                modelSelect.value = localStorage.getItem("aiModel");
            }
            if (localStorage.getItem("aiKey")) {
                document.getElementById("apiKey").value = localStorage.getItem("aiKey");
                document.getElementById("saveKeyCheck").checked = true;
            }
            if (localStorage.getItem("aiSystemPrompt")) {
                document.getElementById("systemPrompt").value = localStorage.getItem("aiSystemPrompt");
            }
        });

        // Clear & Export Handlers
        clearChatBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to clear the chat?")) {
                chatHistory = [];
                chatBox.innerHTML = `
                <div class="flex gap-4 w-full">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center font-bold text-xs shadow-[0_0_10px_rgba(37,99,235,0.4)]">AI</div>
                    <div class="flex-1 bg-[#2f2f2f] text-gray-100 p-4 rounded-2xl rounded-tl-none shadow-sm text-[15px] leading-relaxed border border-white/5">
                        Chat memory cleared. Let's start fresh.
                    </div>
                </div>`;
            }
        });

        exportChatBtn.addEventListener('click', () => {
            if(chatHistory.length === 0) return alert("Nothing to export yet!");
            let content = "Nexus Chat Export\n\n";
            chatHistory.forEach(msg => {
                content += `${msg.role.toUpperCase()}:\n${msg.text}\n\n-----------------\n\n`;
            });
            const blob = new Blob([content], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Nexus_Chat_${new Date().getTime()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // Sending Logic
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        function appendMessage(role, text) {
            const isUser = role === 'user';
            
            // Format markdown basics
            const formattedText = text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            const avatarHTML = isUser 
                ? `<div class="w-8 h-8 rounded-full bg-gray-600 flex-shrink-0 flex items-center justify-center text-xs font-bold shadow-sm">U</div>`
                : `<div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-xs font-bold shadow-[0_0_10px_rgba(37,99,235,0.4)]">AI</div>`;
            
            const messageStyle = isUser
                ? `bg-[#3a3a3a] text-gray-100 rounded-tr-none ml-auto border border-gray-600`
                : `bg-[#2f2f2f] text-gray-100 rounded-tl-none border border-white/5`;

            const html = `
                <div class="flex gap-4 w-full ${isUser ? 'flex-row-reverse' : ''} animate-[fadeIn_0.3s_ease-out]">
                    ${avatarHTML}
                    <div class="p-4 rounded-2xl max-w-[85%] shadow-sm text-[15px] leading-relaxed markdown-body ${messageStyle}">
                        ${formattedText}
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const provider = document.getElementById('aiProvider').value;
            const modelId = document.getElementById('aiModel').value;
            const sysPrompt = document.getElementById('systemPrompt').value.trim();

            if (!text) return;
            if (!apiKey) return openModal();

            // Display UI
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = '56px';
            sendBtn.disabled = true;

            // Push to memory
            chatHistory.push({ role: 'user', text: text });
            if (chatHistory.length > MAX_HISTORY) chatHistory.shift();

            // Typing Animation
            const typingId = 'typing-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `
                <div id="${typingId}" class="flex gap-4 w-full">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center font-bold text-xs">AI</div>
                    <div class="bg-[#2f2f2f] p-4 rounded-2xl rounded-tl-none flex gap-1.5 items-center h-[52px] border border-white/5">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `);
            scrollToBottom();

            try {
                // Human-like response delay buffer
                await new Promise(resolve => setTimeout(resolve, BOT_DELAY_MS));

                let responseText = "";

                if (provider === 'groq') {
                    const messages = [];
                    if (sysPrompt) messages.push({ role: 'system', content: sysPrompt });
                    
                    chatHistory.forEach(msg => {
                        messages.push({ role: msg.role === 'user' ? 'user' : 'assistant', content: msg.text });
                    });

                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: modelId, messages: messages })
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.choices[0].message.content : "Error: " + (data.error?.message || "Invalid Key");
                } 
                else if (provider === 'gemini') {
                    const contents = chatHistory.map(msg => ({
                        role: msg.role === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.text }]
                    }));
                    
                    let payload = { contents: contents };
                    if (sysPrompt) payload.systemInstruction = { parts: [{ text: sysPrompt }] };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.candidates[0].content.parts[0].text : "Error: " + (data.error?.message || "Invalid Key");
                }

                if (!responseText.startsWith("Error:")) {
                    chatHistory.push({ role: 'ai', text: responseText });
                    if (chatHistory.length > MAX_HISTORY) chatHistory.shift();
                }

                document.getElementById(typingId).remove();
                appendMessage('ai', responseText);

            } catch (error) {
                document.getElementById(typingId).remove();
                appendMessage('ai', "Network Error: Cannot connect to API.");
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }
    </script>
</body>
</html>
