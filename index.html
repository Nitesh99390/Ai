<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100 flex flex-col items-center p-4 md:p-8 font-sans selection:bg-blue-500 selection:text-white">
    
    <div class="w-full max-w-4xl bg-gray-800 p-6 md:p-10 rounded-2xl shadow-2xl border border-gray-700">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                Universal AI Playground
            </h1>
            <p class="text-gray-400 text-sm">Bring Your Own Key (BYOK) - Direct & Secure in your browser</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 bg-gray-900 p-6 rounded-xl border border-gray-700 shadow-inner">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Select AI Model</label>
                <select id="aiProvider" class="w-full p-3 bg-gray-800 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-white transition-all cursor-pointer">
                    <option value="groq">Groq (Llama3-8b-8192)</option>
                    <option value="gemini">Google Gemini (1.5 Flash)</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Your API Key</label>
                <input type="password" id="apiKey" placeholder="Paste your API Key here..." class="w-full p-3 bg-gray-800 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-white transition-all">
                
                <div class="flex items-center mt-3">
                    <input type="checkbox" id="saveKeyCheck" class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer">
                    <label for="saveKeyCheck" class="ml-2 text-sm text-gray-400 cursor-pointer">Remember my API Key locally</label>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-300 mb-2">Enter your prompt</label>
            <textarea id="promptText" rows="5" class="w-full p-4 bg-gray-900 border border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-white resize-y transition-all placeholder-gray-500 shadow-inner" placeholder="Write whatever you want the AI to do..."></textarea>
        </div>

        <div class="flex justify-center mb-10">
            <button id="generateBtn" class="bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 px-12 rounded-xl shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center min-w-[250px]">
                <svg id="loadingSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="btnText" class="tracking-wide">Generate Response</span>
            </button>
        </div>

        <div class="relative">
            <label class="block text-sm font-semibold text-gray-300 mb-2 flex justify-between items-center">
                <span>AI Response</span>
                <button id="copyBtn" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 py-1 px-3 rounded transition-colors hidden">Copy Text</button>
            </label>
            <textarea id="outputText" rows="12" class="w-full p-5 bg-gray-900 border border-gray-700 rounded-xl outline-none text-gray-200 resize-y shadow-inner leading-relaxed" readonly placeholder="AI output will appear here..."></textarea>
        </div>
    </div>

    <script>
        // Page load hone par Local Storage check karna
        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem("savedApiKey");
            const savedProvider = localStorage.getItem("savedProvider");
            
            if (savedKey) {
                document.getElementById("apiKey").value = savedKey;
                document.getElementById("saveKeyCheck").checked = true;
            }
            if (savedProvider) {
                document.getElementById("aiProvider").value = savedProvider;
            }
        });

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const provider = document.getElementById('aiProvider').value;
            const apiKey = document.getElementById('apiKey').value.trim();
            const promptText = document.getElementById('promptText').value.trim();
            
            // UI Elements
            const outputText = document.getElementById('outputText');
            const btnText = document.getElementById('btnText');
            const btn = document.getElementById('generateBtn');
            const spinner = document.getElementById('loadingSpinner');
            const copyBtn = document.getElementById('copyBtn');
            const saveKeyCheck = document.getElementById('saveKeyCheck').checked;

            // Validations
            if (!apiKey) {
                alert("API key daalna zaroori hai!");
                return;
            }
            if (!promptText) {
                alert("Prompt khali hai, kuch likho pehle!");
                return;
            }

            // Save or Clear API Key locally based on checkbox
            if (saveKeyCheck) {
                localStorage.setItem("savedApiKey", apiKey);
                localStorage.setItem("savedProvider", provider);
            } else {
                localStorage.removeItem("savedApiKey");
            }

            // Update UI for loading state
            btnText.innerText = "Generating...";
            spinner.classList.remove('hidden');
            outputText.value = "Connecting to " + (provider === 'groq' ? "Groq" : "Gemini") + " API...";
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btn.disabled = true;
            copyBtn.classList.add('hidden');

            try {
                let responseText = "";

                if (provider === 'groq') {
                    // Direct fetch to Groq API
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'llama3-8b-8192',
                            messages: [{ role: 'user', content: promptText }]
                        })
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        responseText = data.choices[0].message.content;
                    } else {
                        responseText = "Groq Error: " + (data.error?.message || "Invalid API Key or Server Error.");
                    }
                } 
                else if (provider === 'gemini') {
                    // Direct fetch to Gemini API
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }]
                        })
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        responseText = data.candidates[0].content.parts[0].text;
                    } else {
                        responseText = "Gemini Error: " + (data.error?.message || "Invalid API Key or Server Error.");
                    }
                }

                outputText.value = responseText;
                
                // Show copy button if generation is successful
                if(responseText && !responseText.includes("Error:")) {
                    copyBtn.classList.remove('hidden');
                }

            } catch (error) {
                outputText.value = "Network Error: Browser se API connect nahi ho paya. Apna internet check karo aur ensure karo API provider active hai.";
                console.error(error);
            } finally {
                // Restore button state
                btnText.innerText = "Generate Response";
                spinner.classList.add('hidden');
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btn.disabled = false;
            }
        });

        // Copy Text Feature
        document.getElementById('copyBtn').addEventListener('click', () => {
            const outputText = document.getElementById('outputText');
            outputText.select();
            document.execCommand('copy');
            
            const copyBtn = document.getElementById('copyBtn');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "Copied!";
            copyBtn.classList.add('bg-green-600', 'text-white');
            copyBtn.classList.remove('bg-gray-700', 'text-gray-300');
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.classList.remove('bg-green-600', 'text-white');
                copyBtn.classList.add('bg-gray-700', 'text-gray-300');
            }, 2000);
        });
    </script>
</body>
</html>
