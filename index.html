<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Smooth Scrollbar for Chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #212121; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #616161; }
        
        .markdown-body p { margin-bottom: 0.5rem; }
        .markdown-body pre { background: #1e1e1e; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem;}
        .markdown-body code { font-family: monospace; }
    </style>
</head>
<body class="bg-[#212121] text-gray-200 h-screen flex flex-col overflow-hidden selection:bg-blue-500 selection:text-white">

    <header class="bg-[#171717] border-b border-gray-800 p-4 flex justify-between items-center relative z-20 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/30">
                AI
            </div>
            <h1 class="text-lg font-semibold tracking-wide">Nexus Chat</h1>
        </div>
        
        <button id="menuBtn" class="p-2 hover:bg-gray-800 rounded-full transition-colors focus:outline-none">
            <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path>
            </svg>
        </button>

        <div id="settingsMenu" class="hidden absolute top-16 right-4 w-72 bg-[#2f2f2f] border border-gray-700 rounded-xl shadow-2xl p-5 flex flex-col gap-4 z-50">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">System Settings</h3>
            
            <div>
                <label class="block text-xs text-gray-300 mb-1">AI Engine</label>
                <select id="aiProvider" class="w-full p-2.5 bg-[#1e1e1e] border border-gray-600 rounded-lg outline-none text-sm text-white focus:border-blue-500">
                    <option value="groq">Groq (Llama-3 8B)</option>
                    <option value="gemini">Google Gemini (1.5 Flash)</option>
                </select>
            </div>
            
            <div>
                <label class="block text-xs text-gray-300 mb-1">API Key</label>
                <input type="password" id="apiKey" placeholder="sk-..." class="w-full p-2.5 bg-[#1e1e1e] border border-gray-600 rounded-lg outline-none text-sm text-white focus:border-blue-500 font-mono">
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="saveKeyCheck" class="w-4 h-4 text-blue-600 bg-[#1e1e1e] border-gray-600 rounded cursor-pointer">
                <label for="saveKeyCheck" class="ml-2 text-xs text-gray-300 cursor-pointer">Save Key Locally</label>
            </div>
            
            <button id="saveSettingsBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-lg transition-colors mt-2">
                Apply & Close
            </button>
        </div>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col items-center">
        <div id="chatBox" class="w-full max-w-3xl flex flex-col gap-6 pb-20">
            
            <div class="flex gap-4 w-full">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center font-bold text-sm">AI</div>
                <div class="flex-1 bg-[#2f2f2f] text-gray-100 p-4 rounded-2xl rounded-tl-none shadow-sm text-[15px] leading-relaxed">
                    Hello! I'm ready to chat. Please set your API Key from the 3-dot menu first.
                </div>
            </div>

        </div>
    </main>

    <div class="bg-[#212121] border-t border-gray-800 p-4 w-full flex justify-center sticky bottom-0">
        <div class="w-full max-w-3xl relative flex items-end bg-[#2f2f2f] rounded-2xl border border-gray-700 focus-within:border-gray-500 transition-colors shadow-lg">
            <textarea id="chatInput" rows="1" placeholder="Message AI..." class="w-full max-h-32 p-4 bg-transparent outline-none text-gray-200 resize-none text-[15px] leading-tight custom-scrollbar" style="min-height: 56px;"></textarea>
            
            <button id="sendBtn" class="p-2 m-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chatInput');
        const chatBox = document.getElementById('chatBox');
        const chatContainer = document.getElementById('chatContainer');
        const sendBtn = document.getElementById('sendBtn');
        const menuBtn = document.getElementById('menuBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        
        // Chat Memory (Store last 10 messages for context)
        let chatHistory = [];
        const MAX_HISTORY = 10;

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        // Toggle Settings Menu
        menuBtn.addEventListener('click', () => {
            settingsMenu.classList.toggle('hidden');
        });

        saveSettingsBtn.addEventListener('click', () => {
            const saveCheck = document.getElementById('saveKeyCheck').checked;
            if(saveCheck) {
                localStorage.setItem("aiKey", document.getElementById('apiKey').value);
                localStorage.setItem("aiProvider", document.getElementById('aiProvider').value);
            } else {
                localStorage.removeItem("aiKey");
            }
            settingsMenu.classList.add('hidden');
        });

        // Load saved settings
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("aiKey")) {
                document.getElementById("apiKey").value = localStorage.getItem("aiKey");
                document.getElementById("saveKeyCheck").checked = true;
            }
            if (localStorage.getItem("aiProvider")) {
                document.getElementById("aiProvider").value = localStorage.getItem("aiProvider");
            }
        });

        // Handle Enter to send (Shift+Enter for new line)
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        function appendMessage(role, text) {
            const isUser = role === 'user';
            
            // Format text (Basic formatting for codeblocks and line breaks)
            const formattedText = text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\n/g, '<br>');

            const avatarHTML = isUser 
                ? `<div class="w-8 h-8 rounded-full bg-gray-600 flex-shrink-0 flex items-center justify-center text-sm font-bold">U</div>`
                : `<div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-sm font-bold">AI</div>`;
            
            const messageStyle = isUser
                ? `bg-[#171717] text-gray-100 rounded-tr-none ml-auto border border-gray-700`
                : `bg-[#2f2f2f] text-gray-100 rounded-tl-none`;

            const html = `
                <div class="flex gap-4 w-full ${isUser ? 'flex-row-reverse' : ''}">
                    ${avatarHTML}
                    <div class="p-4 rounded-2xl max-w-[85%] shadow-sm text-[15px] leading-relaxed markdown-body ${messageStyle}">
                        ${formattedText}
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const provider = document.getElementById('aiProvider').value;

            if (!text) return;
            
            if (!apiKey) {
                alert("Please set your API Key in the 3-dot menu first.");
                settingsMenu.classList.remove('hidden');
                return;
            }

            // Append user message
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = '56px';
            sendBtn.disabled = true;

            // Add to history
            chatHistory.push({ role: 'user', text: text });
            if (chatHistory.length > MAX_HISTORY) chatHistory.shift();

            // Create typing indicator
            const typingId = 'typing-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `
                <div id="${typingId}" class="flex gap-4 w-full">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center font-bold text-sm">AI</div>
                    <div class="bg-[#2f2f2f] p-4 rounded-2xl rounded-tl-none flex gap-1 items-center">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `);
            scrollToBottom();

            try {
                let responseText = "";

                if (provider === 'groq') {
                    // Format history for Groq
                    const messages = chatHistory.map(msg => ({
                        role: msg.role === 'user' ? 'user' : 'assistant',
                        content: msg.text
                    }));

                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: 'llama3-8b-8192', messages: messages })
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.choices[0].message.content : "Error: " + (data.error?.message || "Invalid Key");
                } 
                else if (provider === 'gemini') {
                    // Format history for Gemini
                    const contents = chatHistory.map(msg => ({
                        role: msg.role === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.text }]
                    }));

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: contents })
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.candidates[0].content.parts[0].text : "Error: " + (data.error?.message || "Invalid Key");
                }

                // Add to history
                if (!responseText.startsWith("Error:")) {
                    chatHistory.push({ role: 'ai', text: responseText });
                    if (chatHistory.length > MAX_HISTORY) chatHistory.shift();
                }

                // Remove typing indicator and show response
                document.getElementById(typingId).remove();
                appendMessage('ai', responseText);

            } catch (error) {
                document.getElementById(typingId).remove();
                appendMessage('ai', "Network Error: Cannot connect to API.");
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }
    </script>
</body>
</html>
