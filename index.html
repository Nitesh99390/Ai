<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #616161; }
        
        .markdown-body p { margin-bottom: 0.5rem; }
        .markdown-body pre { background: #1e1e1e; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem;}
        .markdown-body code { font-family: monospace; font-size: 0.9em; color: #a3b8cc; }
    </style>
</head>
<body class="bg-[#212121] text-gray-200 h-screen flex flex-col overflow-hidden selection:bg-blue-500 selection:text-white">

    <header class="bg-[#171717] border-b border-gray-800 p-4 flex justify-between items-center relative z-10 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                AI
            </div>
            <h1 class="text-lg font-semibold tracking-wide">Nexus Chat</h1>
        </div>
        
        <button id="menuBtn" class="p-2 bg-transparent hover:bg-gray-800 rounded-full transition-colors focus:outline-none cursor-pointer">
            <svg class="w-6 h-6 text-gray-300" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path>
            </svg>
        </button>
    </header>

    <div id="settingsOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center transition-opacity">
        <div id="settingsModal" class="bg-[#2a2a2a] w-11/12 max-w-sm border border-gray-700 rounded-2xl shadow-2xl p-6 flex flex-col gap-5 transform scale-95 transition-transform">
            
            <div class="flex justify-between items-center border-b border-gray-700 pb-3">
                <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-widest">System Setup</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-white p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-medium">AI Engine</label>
                <select id="aiProvider" class="w-full p-3 bg-[#1e1e1e] border border-gray-600 rounded-xl outline-none text-sm text-white focus:border-blue-500 transition-colors cursor-pointer">
                    <option value="groq">Groq (Llama-3 8B)</option>
                    <option value="gemini">Google Gemini (1.5 Flash)</option>
                </select>
            </div>
            
            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-medium">API Key</label>
                <input type="password" id="apiKey" placeholder="sk-..." class="w-full p-3 bg-[#1e1e1e] border border-gray-600 rounded-xl outline-none text-sm text-white focus:border-blue-500 font-mono transition-colors">
            </div>

            <div class="flex items-center ml-1">
                <input type="checkbox" id="saveKeyCheck" class="w-4 h-4 text-blue-600 bg-[#1e1e1e] border-gray-600 rounded cursor-pointer accent-blue-600">
                <label for="saveKeyCheck" class="ml-3 text-sm text-gray-300 cursor-pointer select-none">Save Key Locally</label>
            </div>
            
            <button id="saveSettingsBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold py-3.5 rounded-xl transition-colors mt-2 shadow-lg shadow-blue-600/20 active:scale-[0.98]">
                Save & Continue
            </button>
        </div>
    </div>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col items-center">
        <div id="chatBox" class="w-full max-w-3xl flex flex-col gap-6 pb-4">
            
            <div class="flex gap-4 w-full">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center font-bold text-xs shadow-[0_0_10px_rgba(37,99,235,0.4)]">AI</div>
                <div class="flex-1 bg-[#2f2f2f] text-gray-100 p-4 rounded-2xl rounded-tl-none shadow-sm text-[15px] leading-relaxed border border-white/5">
                    Hello! I'm ready to chat. Please set your API Key from the 3-dot menu first.
                </div>
            </div>

        </div>
    </main>

    <div class="bg-[#212121] p-4 w-full flex justify-center pb-6 border-t border-gray-800/50">
        <div class="w-full max-w-3xl relative flex items-end bg-[#2a2a2a] rounded-3xl border border-gray-600 focus-within:border-gray-400 transition-colors shadow-lg">
            <textarea id="chatInput" rows="1" placeholder="Type a message..." class="w-full max-h-32 p-4 pl-5 bg-transparent outline-none text-gray-200 resize-none text-[15px] leading-tight custom-scrollbar" style="min-height: 56px;"></textarea>
            
            <button id="sendBtn" class="p-2 m-2 bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center w-10 h-10 shadow-md">
                <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('chatInput');
        const chatBox = document.getElementById('chatBox');
        const chatContainer = document.getElementById('chatContainer');
        const sendBtn = document.getElementById('sendBtn');
        
        // Modal Elements
        const menuBtn = document.getElementById('menuBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const settingsModal = document.getElementById('settingsModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        
        // Chat Memory (Last 10 messages context)
        let chatHistory = [];
        const MAX_HISTORY = 10;

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        // Toggle Modal Functions
        function openModal() {
            settingsOverlay.classList.remove('hidden');
            setTimeout(() => settingsModal.classList.remove('scale-95'), 10);
        }
        function closeModal() {
            settingsModal.classList.add('scale-95');
            setTimeout(() => settingsOverlay.classList.add('hidden'), 200);
        }

        menuBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        
        // Close modal on clicking outside
        settingsOverlay.addEventListener('click', (e) => {
            if(e.target === settingsOverlay) closeModal();
        });

        saveSettingsBtn.addEventListener('click', () => {
            const saveCheck = document.getElementById('saveKeyCheck').checked;
            if(saveCheck) {
                localStorage.setItem("aiKey", document.getElementById('apiKey').value);
                localStorage.setItem("aiProvider", document.getElementById('aiProvider').value);
            } else {
                localStorage.removeItem("aiKey");
            }
            closeModal();
        });

        // Load saved settings
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("aiKey")) {
                document.getElementById("apiKey").value = localStorage.getItem("aiKey");
                document.getElementById("saveKeyCheck").checked = true;
            }
            if (localStorage.getItem("aiProvider")) {
                document.getElementById("aiProvider").value = localStorage.getItem("aiProvider");
            }
        });

        // Handle Enter key
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        function appendMessage(role, text) {
            const isUser = role === 'user';
            
            // Format text basic markdown for blocks
            const formattedText = text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\n/g, '<br>');

            const avatarHTML = isUser 
                ? `<div class="w-8 h-8 rounded-full bg-gray-600 flex-shrink-0 flex items-center justify-center text-xs font-bold shadow-sm">U</div>`
                : `<div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-xs font-bold shadow-[0_0_10px_rgba(37,99,235,0.4)]">AI</div>`;
            
            const messageStyle = isUser
                ? `bg-[#3a3a3a] text-gray-100 rounded-tr-none ml-auto border border-gray-600`
                : `bg-[#2f2f2f] text-gray-100 rounded-tl-none border border-white/5`;

            const html = `
                <div class="flex gap-4 w-full ${isUser ? 'flex-row-reverse' : ''} animate-[fadeIn_0.3s_ease-out]">
                    ${avatarHTML}
                    <div class="p-4 rounded-2xl max-w-[85%] shadow-sm text-[15px] leading-relaxed markdown-body ${messageStyle}">
                        ${formattedText}
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const provider = document.getElementById('aiProvider').value;

            if (!text) return;
            
            if (!apiKey) {
                openModal();
                return;
            }

            // Append user message
            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = '56px';
            sendBtn.disabled = true;

            // Add to history for Context Memory
            chatHistory.push({ role: 'user', text: text });
            if (chatHistory.length > MAX_HISTORY) chatHistory.shift();

            // Typing indicator
            const typingId = 'typing-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `
                <div id="${typingId}" class="flex gap-4 w-full">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center font-bold text-xs">AI</div>
                    <div class="bg-[#2f2f2f] p-4 rounded-2xl rounded-tl-none flex gap-1.5 items-center h-[52px] border border-white/5">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `);
            scrollToBottom();

            try {
                // Human-like response delay
                await new Promise(resolve => setTimeout(resolve, 4000));

                let responseText = "";

                if (provider === 'groq') {
                    const messages = chatHistory.map(msg => ({
                        role: msg.role === 'user' ? 'user' : 'assistant',
                        content: msg.text
                    }));

                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: 'llama3-8b-8192', messages: messages })
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.choices[0].message.content : "Error: " + (data.error?.message || "Invalid Key");
                } 
                else if (provider === 'gemini') {
                    const contents = chatHistory.map(msg => ({
                        role: msg.role === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.text }]
                    }));

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: contents })
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.candidates[0].content.parts[0].text : "Error: " + (data.error?.message || "Invalid Key");
                }

                // Add to Context Memory
                if (!responseText.startsWith("Error:")) {
                    chatHistory.push({ role: 'ai', text: responseText });
                    if (chatHistory.length > MAX_HISTORY) chatHistory.shift();
                }

                document.getElementById(typingId).remove();
                appendMessage('ai', responseText);

            } catch (error) {
                document.getElementById(typingId).remove();
                appendMessage('ai', "Network Error: Cannot connect to API.");
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }
    </script>
</body>
</html>
