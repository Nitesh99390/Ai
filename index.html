<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0284c7; }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Glowing Animations */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="bg-[#0b1120] text-gray-100 min-h-screen relative overflow-hidden flex items-center justify-center p-4 selection:bg-cyan-500 selection:text-white">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[128px] opacity-30 animate-blob"></div>
    <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-cyan-600 rounded-full mix-blend-screen filter blur-[128px] opacity-30 animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[128px] opacity-30 animate-blob animation-delay-4000"></div>

    <div class="w-full max-w-5xl glass-panel p-8 md:p-12 rounded-3xl shadow-2xl relative z-10 flex flex-col md:flex-row gap-8">
        
        <div class="w-full md:w-5/12 flex flex-col gap-6">
            
            <div>
                <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">Nexus AI</h1>
                <p class="text-gray-400 text-sm font-light">Direct browser inference engine.</p>
            </div>

            <div class="group">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 group-focus-within:text-cyan-400 transition-colors">Select Engine</label>
                <div class="relative">
                    <select id="aiProvider" class="w-full p-4 bg-black/40 border border-white/10 rounded-xl appearance-none outline-none text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all cursor-pointer">
                        <option value="groq" class="bg-gray-900">Groq (Llama-3 8B)</option>
                        <option value="gemini" class="bg-gray-900">Google Gemini (1.5 Flash)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <div class="group">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 group-focus-within:text-cyan-400 transition-colors">Access Key</label>
                <input type="password" id="apiKey" placeholder="sk-..." class="w-full p-4 bg-black/40 border border-white/10 rounded-xl outline-none text-white focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all placeholder-gray-600 font-mono text-sm">
                
                <div class="flex items-center mt-3 ml-1">
                    <input type="checkbox" id="saveKeyCheck" class="w-4 h-4 text-cyan-500 bg-black/40 border-gray-600 rounded focus:ring-cyan-500 focus:ring-2 cursor-pointer appearance-none checked:bg-cyan-500 relative before:content-['✔'] before:absolute before:text-white before:text-xs before:left-[2px] before:-top-[1px] before:hidden checked:before:block">
                    <label for="saveKeyCheck" class="ml-3 text-xs text-gray-400 cursor-pointer hover:text-gray-300 transition-colors">Save key locally</label>
                </div>
            </div>

            <div class="mt-auto pt-6">
                <button id="generateBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-semibold py-4 px-6 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:shadow-[0_0_30px_rgba(6,182,212,0.5)] transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-3">
                    <svg id="loadingSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">Initialize Sequence</span>
                    <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </button>
            </div>
        </div>

        <div class="w-full md:w-7/12 flex flex-col gap-6">
            
            <div class="group flex-1 flex flex-col">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 group-focus-within:text-cyan-400 transition-colors">Command Prompt</label>
                <textarea id="promptText" class="w-full flex-1 min-h-[120px] p-5 bg-black/40 border border-white/10 rounded-xl focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none text-gray-200 resize-none transition-all placeholder-gray-600 shadow-inner" placeholder="Enter instructions for the AI..."></textarea>
            </div>

            <div class="group flex-[2] flex flex-col relative">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider group-focus-within:text-cyan-400 transition-colors">Terminal Output</label>
                    <button id="copyBtn" class="text-xs bg-white/5 hover:bg-white/10 text-cyan-400 py-1.5 px-4 rounded-lg transition-all border border-white/5 hover:border-cyan-500/30 hidden flex items-center gap-2">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy
                    </button>
                </div>
                <textarea id="outputText" class="w-full flex-1 min-h-[250px] p-6 bg-[#050b14]/80 border border-white/5 rounded-xl outline-none text-gray-300 resize-none shadow-inner leading-relaxed font-mono text-sm" readonly placeholder="Awaiting execution..."></textarea>
            </div>
            
        </div>
    </div>

    <script>
        // Load Saved Settings on Startup
        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem("nexusApiKey");
            const savedProvider = localStorage.getItem("nexusProvider");
            
            if (savedKey) {
                document.getElementById("apiKey").value = savedKey;
                document.getElementById("saveKeyCheck").checked = true;
            }
            if (savedProvider) {
                document.getElementById("aiProvider").value = savedProvider;
            }
        });

        // Generate Logic
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const provider = document.getElementById('aiProvider').value;
            const apiKey = document.getElementById('apiKey').value.trim();
            const promptText = document.getElementById('promptText').value.trim();
            
            const outputText = document.getElementById('outputText');
            const btnText = document.getElementById('btnText');
            const btn = document.getElementById('generateBtn');
            const spinner = document.getElementById('loadingSpinner');
            const btnIcon = document.getElementById('btnIcon');
            const copyBtn = document.getElementById('copyBtn');
            const saveKeyCheck = document.getElementById('saveKeyCheck').checked;

            if (!apiKey) {
                outputText.value = ">> ERROR: Authentication key missing.";
                document.getElementById('apiKey').focus();
                return;
            }
            if (!promptText) {
                outputText.value = ">> ERROR: Command prompt is empty.";
                document.getElementById('promptText').focus();
                return;
            }

            // Save/Remove Key
            if (saveKeyCheck) {
                localStorage.setItem("nexusApiKey", apiKey);
                localStorage.setItem("nexusProvider", provider);
            } else {
                localStorage.removeItem("nexusApiKey");
            }

            // Loading State UI
            btnText.innerText = "Processing...";
            spinner.classList.remove('hidden');
            btnIcon.classList.add('hidden');
            outputText.value = `>> Initializing connection to ${provider.toUpperCase()}...\n>> Transmitting data...`;
            btn.classList.add('opacity-75', 'cursor-not-allowed', 'scale-95');
            btn.disabled = true;
            copyBtn.classList.add('hidden');

            try {
                let responseText = "";

                if (provider === 'groq') {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'llama3-8b-8192',
                            messages: [{ role: 'user', content: promptText }]
                        })
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.choices[0].message.content : ">> API ERROR: " + (data.error?.message || "Invalid Key");
                } 
                else if (provider === 'gemini') {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });
                    const data = await response.json();
                    responseText = response.ok ? data.candidates[0].content.parts[0].text : ">> API ERROR: " + (data.error?.message || "Invalid Key");
                }

                outputText.value = responseText;
                
                if(responseText && !responseText.includes(">> API ERROR:")) {
                    copyBtn.classList.remove('hidden');
                }

            } catch (error) {
                outputText.value = ">> NETWORK ERROR: Connection failed. Check internet or API endpoint.";
            } finally {
                // Restore State UI
                btnText.innerText = "Initialize Sequence";
                spinner.classList.add('hidden');
                btnIcon.classList.remove('hidden');
                btn.classList.remove('opacity-75', 'cursor-not-allowed', 'scale-95');
                btn.disabled = false;
            }
        });

        // Copy logic
        document.getElementById('copyBtn').addEventListener('click', () => {
            const outputText = document.getElementById('outputText');
            outputText.select();
            document.execCommand('copy');
            
            const copyBtn = document.getElementById('copyBtn');
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied';
            copyBtn.classList.add('text-green-400', 'border-green-400/30', 'bg-green-400/10');
            copyBtn.classList.remove('text-cyan-400', 'border-white/5', 'bg-white/5');
            
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.classList.remove('text-green-400', 'border-green-400/30', 'bg-green-400/10');
                copyBtn.classList.add('text-cyan-400', 'border-white/5', 'bg-white/5');
            }, 2000);
        });
    </script>
</body>
</html>
